services:
  postgres:
    image: postgres:15
    container_name: nsp_alarm_db

    environment:
      POSTGRES_DB: nsp
      POSTGRES_USER: nsp_user
      POSTGRES_PASSWORD: nsp_pass

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nsp_user -d nsp"]
      interval: 10s
      retries: 5

    restart: unless-stopped

  nsp-alarm-consumer:
    build: .
    container_name: nsp-alarm-consumer

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env
      

    environment:
      DB_HOST: nsp_alarm_db
      DB_PORT: 5432

    volumes:
      - ./data:/app/data
      - ./ca.pem:/app/ca.pem:ro
      - ./nsp_keystore.p12:/app/nsp_keystore.p12:ro

    restart: unless-stopped

volumes:
  postgres_data: